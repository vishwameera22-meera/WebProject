<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bird Paradise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🐦 Bird Paradise</h1>
        <p>Your One-Stop Bird Shop</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Birds</a>
        <a href="#">Accessories</a>
        <a href="#">Food</a>
        <a href="#">Contact</a>
    </nav>

    <section class="hero">
        <h2>Bring Home a Feathered Friend!</h2>
        <p>Healthy, Happy and Beautiful Birds for Every Home.</p>
        <button>Explore Birds</button>
    </section>

    <section class="birds">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1522926193341-e9ffd686c60f?w=300" alt="Parrot">
            <h3>Parrot</h3>
            <p>₹4,500</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1452570053594-1b985d6ea890?w=300" alt="Love Bird">
            <h3>Love Bird</h3>
            <p>₹2,800</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1501706362039-c6e80948bb5f?w=300" alt="Cockatiel">
            <h3>Cockatiel</h3>
            <p>₹3,700</p>
            <button>Buy Now</button>
        </div>

    </section>

    <footer>
        <p>© 2026 Bird Paradise | Made with ❤️</p>
    </footer>

</body>
</html>
